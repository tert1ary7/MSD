<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God View: Enterprise License Telemetry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="msd-container">
        <header class="system-header">
            <div class="header-metric">SYSTEM INTEGRITY: <span id="pulse-timer" class="neon-green">NOMINAL</span></div>
            <div class="header-metric critical-text">GLOBAL DENIALS: <span id="denial-counter">0</span></div>
        </header>

        <div class="main-display">
            <aside class="infrastructure-sidebar" id="server-stack">
                <div class="sidebar-title">INFRASTRUCTURE</div>
                </aside>

            <section class="core-matrix" id="hex-grid">
                </section>
        </div>

        <footer class="budgetary-flow">
            <div class="flow-title">REAL-TIME ORGANIZATIONAL ALLOCATION</div>
            <div class="flow-bars" id="org-flows">
                </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
